<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Cache control: prevent stale HTML on mobile after deploys -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>器材檢索表</title>
  <link rel="stylesheet" href="style.css?v=10" />
</head>
<body>
  <div class="app">
    <!-- Header — title + flow guide + stats -->
    <header class="app-header">
      <h1>器材檢索表</h1>
      <p class="app-flow">
        <span class="flow-step"><span class="flow-num">1</span>查詢器材位置與狀態</span>
        <span class="flow-arrow">›</span>
        <span class="flow-step"><span class="flow-num">2</span>點卡片查看詳情</span>
        <span class="flow-arrow">›</span>
        <span class="flow-step"><span class="flow-num">3</span>按「我要借用」填表單</span>
      </p>
      <p class="app-stats-line">
        共 <strong id="totalCount">0</strong> 件器材
        · <strong id="categoryCount">0</strong> 個類別
        · 目前顯示 <strong id="visibleCount">0</strong> 件
      </p>
    </header>

    <!-- Mode toggle — most prominent (highest hierarchy) -->
    <nav class="mode-nav" aria-label="瀏覽模式">
      <button class="mode-btn active" id="modeLocationBtn" type="button">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        依位置
      </button>
      <button class="mode-btn" id="modeCategoryBtn" type="button">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        依分類
      </button>
      <button class="mode-btn" id="modeAllBtn" type="button">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        全部
      </button>
    </nav>

    <!-- Filter bar — compact, secondary tools -->
    <div class="filter-bar">
      <div class="search-wrap">
        <span class="search-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input id="searchInput" placeholder="搜尋類別 / 編號 / 項目 / 位置 / 用途" />
      </div>
      <select id="locationFilter" aria-label="位置篩選">
        <option value="">全部位置</option>
      </select>
      <select id="statusFilter" aria-label="狀態篩選">
        <option value="">全部狀態</option>
        <option value="可借用">✅ 只看可借用</option>
        <option value="借出中">🟡 只看借出中</option>
        <option value="維修中">🔴 只看維修中</option>
      </select>
      <select id="sortBy" aria-label="排序方式">
        <option value="項目">依名稱（A→Z）</option>
        <option value="位置">依位置分組</option>
      </select>
    </div>

    <!-- Quick filter: only available -->
    <label class="quick-filter">
      <input type="checkbox" id="onlyAvailable" />
      <span>只顯示可借用</span>
    </label>

    <!-- Main content -->
    <main class="content-panel">
      <div id="locationMap" class="location-map-wrap" hidden></div>
      <div class="tab-bar" id="tabBar"></div>
      <div id="contentArea"></div>
    </main>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal" hidden role="dialog" aria-modal="true" aria-label="設備詳情">
    <div class="modal-content">
      <button class="modal-close" aria-label="關閉">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="script.js?v=10"></script>
  <script src="borrow.js?v=11"></script>
  <script src="bundles.js?v=3"></script>
</body>
</html>
