<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>器材檢索表</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="app-header">
      <h1>器材檢索表</h1>
      <p class="app-subtitle">依類別或位置瀏覽器材，點擊卡片查看設備詳情與示意圖。</p>
    </header>

    <!-- Filter Panel -->
    <div class="panel">
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input id="searchInput" placeholder="搜尋類別 / 編號 / 項目 / 位置" />
        </div>

        <select id="locationFilter">
          <option value="">全部位置</option>
        </select>

        <select id="sortBy">
          <option value="項目">依項目排序</option>
          <option value="位置">依位置排序</option>
        </select>
      </div>

      <div class="mode-toggle">
        <button class="mode-btn" id="modeCategoryBtn" type="button">分類瀏覽</button>
        <button class="mode-btn active" id="modeLocationBtn" type="button">位置瀏覽</button>
        <button class="mode-btn" id="modeAllBtn" type="button">全部列表</button>
      </div>

      <div class="stats">
        <div class="stat"><div class="label">總筆數</div><div class="value" id="totalCount">0</div></div>
        <div class="stat"><div class="label">目前顯示</div><div class="value" id="visibleCount">0</div></div>
        <div class="stat"><div class="label">類別數</div><div class="value" id="categoryCount">0</div></div>
      </div>
    </div>

    <!-- Content Panel -->
    <div class="panel">
      <!-- Location Map (shown only in 位置瀏覽 mode) -->
      <div id="locationMap" class="location-map-wrap" hidden></div>
      <div class="tab-bar" id="tabBar"></div>
      <div id="contentArea"></div>
    </div>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal" hidden role="dialog" aria-modal="true" aria-label="設備詳情">
    <div class="modal-content">
      <button class="modal-close" aria-label="關閉">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <div class="modal-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="script.js"></script>
  <script src="borrow.js"></script>
</body>
</html>
