<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="-apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif">
  <defs>
    <!-- Floor pattern -->
    <pattern id="floor" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#f5f0eb"/>
      <rect x="0" y="0" width="20" height="20" fill="#efe9e3" rx="1"/>
      <rect x="20" y="20" width="20" height="20" fill="#efe9e3" rx="1"/>
    </pattern>
    <!-- Wall gradient -->
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e4e0"/>
      <stop offset="100%" stop-color="#d4d0cc"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowSm" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- ═══ Background ═══ -->
  <!-- Back wall -->
  <rect x="0" y="0" width="900" height="280" fill="url(#wallGrad)"/>
  <!-- Side wall -->
  <rect x="0" y="0" width="80" height="600" fill="#ddd8d4"/>
  <!-- Floor -->
  <rect x="0" y="280" width="900" height="320" fill="url(#floor)"/>
  <!-- Baseboard -->
  <rect x="80" y="270" width="820" height="12" fill="#c8c3be" rx="2"/>
  <rect x="70" y="0" width="12" height="600" fill="#c8c3be" rx="2"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#333">📍 器材室收納位置圖</text>

  <!-- ═══ 木櫃子 (Wooden Cabinet) — left side against wall ═══ -->
  <g transform="translate(115, 80)" filter="url(#shadow)">
    <!-- Cabinet body -->
    <rect x="0" y="0" width="200" height="210" fill="#c4a87c" rx="4" stroke="#a08860" stroke-width="1.5"/>
    <!-- Cabinet top -->
    <rect x="-4" y="-6" width="208" height="10" fill="#d4b88c" rx="3"/>

    <!-- 6 doors: 2 columns × 3 rows -->
    <!-- Row 1: 左上 / 右上 -->
    <rect x="8" y="10" width="86" height="56" fill="#dcc8a0" rx="3" stroke="#b8a070" stroke-width="1"/>
    <circle cx="80" cy="38" r="4" fill="#8b7355" stroke="#6b5540" stroke-width="0.8"/>
    <rect x="106" y="10" width="86" height="56" fill="#dcc8a0" rx="3" stroke="#b8a070" stroke-width="1"/>
    <circle cx="120" cy="38" r="4" fill="#8b7355" stroke="#6b5540" stroke-width="0.8"/>

    <!-- Row 2 (right middle = 右中) -->
    <rect x="8" y="74" width="86" height="56" fill="#dcc8a0" rx="3" stroke="#b8a070" stroke-width="1"/>
    <circle cx="80" cy="102" r="4" fill="#8b7355" stroke="#6b5540" stroke-width="0.8"/>
    <rect x="106" y="74" width="86" height="56" fill="#dcc8a0" rx="3" stroke="#b8a070" stroke-width="1"/>
    <circle cx="120" cy="102" r="4" fill="#8b7355" stroke="#6b5540" stroke-width="0.8"/>

    <!-- Row 3 -->
    <rect x="8" y="138" width="86" height="56" fill="#dcc8a0" rx="3" stroke="#b8a070" stroke-width="1"/>
    <circle cx="80" cy="166" r="4" fill="#8b7355" stroke="#6b5540" stroke-width="0.8"/>
    <rect x="106" y="138" width="86" height="56" fill="#dcc8a0" rx="3" stroke="#b8a070" stroke-width="1"/>
    <circle cx="120" cy="166" r="4" fill="#8b7355" stroke="#6b5540" stroke-width="0.8"/>

    <!-- Labels on doors -->
    <rect x="14" y="22" width="72" height="18" fill="rgba(0,0,0,0.75)" rx="3"/>
    <text x="50" y="35" text-anchor="middle" font-size="10" fill="white" font-weight="600">木櫃子左上</text>
    <text x="50" y="50" text-anchor="middle" font-size="8" fill="#b8a070">配件 / 記憶卡</text>

    <rect x="112" y="22" width="72" height="18" fill="rgba(0,0,0,0.75)" rx="3"/>
    <text x="148" y="35" text-anchor="middle" font-size="10" fill="white" font-weight="600">木櫃子右上</text>
    <text x="148" y="50" text-anchor="middle" font-size="8" fill="#b8a070">收音 / 麥克風</text>

    <rect x="112" y="86" width="72" height="18" fill="rgba(0,0,0,0.85)" rx="3"/>
    <text x="148" y="99" text-anchor="middle" font-size="10" fill="white" font-weight="700">木櫃子右中</text>
    <text x="148" y="114" text-anchor="middle" font-size="8" fill="#b8a070">相機 / DJI 全套</text>
    <text x="148" y="124" text-anchor="middle" font-size="7" fill="#9a8a6a">（44件・最多設備）</text>
  </g>

  <!-- ═══ 大推車 (Big Cart) — black metal, center ═══ -->
  <g transform="translate(380, 95)" filter="url(#shadow)">
    <!-- Cart frame -->
    <rect x="0" y="0" width="140" height="200" fill="#2a2a2a" rx="4"/>
    <!-- Wheels -->
    <circle cx="15" cy="205" r="8" fill="#444" stroke="#333" stroke-width="1.5"/>
    <circle cx="125" cy="205" r="8" fill="#444" stroke="#333" stroke-width="1.5"/>
    <!-- Handle -->
    <rect x="-5" y="-15" width="150" height="8" fill="#333" rx="4"/>
    <rect x="-5" y="-15" width="6" height="20" fill="#333" rx="2"/>
    <rect x="139" y="-15" width="6" height="20" fill="#333" rx="2"/>

    <!-- Shelf dividers -->
    <rect x="5" y="60" width="130" height="3" fill="#444" rx="1"/>
    <rect x="5" y="130" width="130" height="3" fill="#444" rx="1"/>

    <!-- Top shelf content hints (tripods) -->
    <rect x="15" y="10" width="8" height="45" fill="#888" rx="2" transform="rotate(-5 19 32)"/>
    <rect x="35" y="12" width="6" height="42" fill="#777" rx="2"/>
    <rect x="55" y="8" width="7" height="48" fill="#999" rx="2" transform="rotate(3 58 32)"/>

    <!-- Middle shelf content hints -->
    <rect x="15" y="68" width="50" height="30" fill="#555" rx="3"/>
    <rect x="75" y="70" width="45" height="25" fill="#666" rx="3"/>

    <!-- Bottom shelf content hints -->
    <rect x="15" y="140" width="60" height="35" fill="#444" rx="4"/>
    <rect x="85" y="145" width="40" height="28" fill="#555" rx="3"/>

    <!-- Labels -->
    <rect x="10" y="5" width="82" height="16" fill="rgba(255,255,255,0.9)" rx="3"/>
    <text x="51" y="16" text-anchor="middle" font-size="9" fill="#333" font-weight="700">大推車（中）</text>
    <text x="70" y="56" text-anchor="middle" font-size="7" fill="#aaa">三腳架 / 燈架</text>

    <rect x="10" y="133" width="82" height="16" fill="rgba(255,255,255,0.9)" rx="3"/>
    <text x="51" y="144" text-anchor="middle" font-size="9" fill="#333" font-weight="700">大推車（下）</text>
    <text x="70" y="175" text-anchor="middle" font-size="7" fill="#aaa">油壓腳架 / 兔籠</text>
  </g>

  <!-- ═══ 小推車 (Small Cart) — white, next to big cart ═══ -->
  <g transform="translate(560, 155)" filter="url(#shadowSm)">
    <!-- Cart body -->
    <rect x="0" y="0" width="100" height="140" fill="#f0f0f0" rx="5" stroke="#ddd" stroke-width="1"/>
    <!-- Handle -->
    <rect x="-3" y="-12" width="106" height="6" fill="#e0e0e0" rx="3"/>
    <!-- Wheels -->
    <circle cx="12" cy="146" r="6" fill="#ccc" stroke="#bbb" stroke-width="1"/>
    <circle cx="88" cy="146" r="6" fill="#ccc" stroke="#bbb" stroke-width="1"/>

    <!-- Shelf dividers -->
    <rect x="5" y="44" width="90" height="2" fill="#ddd"/>
    <rect x="5" y="90" width="90" height="2" fill="#ddd"/>

    <!-- Content hints -->
    <rect x="15" y="8" width="30" height="30" fill="#e8e8e8" rx="4"/>
    <rect x="55" y="10" width="30" height="26" fill="#e0e0e0" rx="4"/>
    <rect x="20" y="52" width="60" height="30" fill="#e5e5e5" rx="4"/>

    <!-- Label -->
    <rect x="10" y="96" width="80" height="16" fill="rgba(0,0,0,0.75)" rx="3"/>
    <text x="50" y="108" text-anchor="middle" font-size="9" fill="white" font-weight="600">小推車</text>
    <text x="50" y="88" text-anchor="middle" font-size="7" fill="#999">補光燈 / Godox</text>
  </g>

  <!-- ═══ 洞洞板 (Pegboard) — on back wall, right side ═══ -->
  <g transform="translate(620, 55)" filter="url(#shadowSm)">
    <!-- Pegboard body -->
    <rect x="0" y="0" width="240" height="220" fill="#2d2d2d" rx="3"/>

    <!-- Peg holes pattern -->
    <g fill="#222">
      <!-- Generate pegboard holes in a grid -->
      <circle cx="20" cy="20" r="3"/><circle cx="45" cy="20" r="3"/><circle cx="70" cy="20" r="3"/><circle cx="95" cy="20" r="3"/><circle cx="120" cy="20" r="3"/><circle cx="145" cy="20" r="3"/><circle cx="170" cy="20" r="3"/><circle cx="195" cy="20" r="3"/><circle cx="220" cy="20" r="3"/>
      <circle cx="20" cy="45" r="3"/><circle cx="45" cy="45" r="3"/><circle cx="70" cy="45" r="3"/><circle cx="95" cy="45" r="3"/><circle cx="120" cy="45" r="3"/><circle cx="145" cy="45" r="3"/><circle cx="170" cy="45" r="3"/><circle cx="195" cy="45" r="3"/><circle cx="220" cy="45" r="3"/>
      <circle cx="20" cy="70" r="3"/><circle cx="45" cy="70" r="3"/><circle cx="70" cy="70" r="3"/><circle cx="95" cy="70" r="3"/><circle cx="120" cy="70" r="3"/><circle cx="145" cy="70" r="3"/><circle cx="170" cy="70" r="3"/><circle cx="195" cy="70" r="3"/><circle cx="220" cy="70" r="3"/>
      <circle cx="20" cy="95" r="3"/><circle cx="45" cy="95" r="3"/><circle cx="70" cy="95" r="3"/><circle cx="95" cy="95" r="3"/><circle cx="120" cy="95" r="3"/><circle cx="145" cy="95" r="3"/><circle cx="170" cy="95" r="3"/><circle cx="195" cy="95" r="3"/><circle cx="220" cy="95" r="3"/>
      <circle cx="20" cy="120" r="3"/><circle cx="45" cy="120" r="3"/><circle cx="70" cy="120" r="3"/><circle cx="95" cy="120" r="3"/><circle cx="120" cy="120" r="3"/><circle cx="145" cy="120" r="3"/><circle cx="170" cy="120" r="3"/><circle cx="195" cy="120" r="3"/><circle cx="220" cy="120" r="3"/>
      <circle cx="20" cy="145" r="3"/><circle cx="45" cy="145" r="3"/><circle cx="70" cy="145" r="3"/><circle cx="95" cy="145" r="3"/><circle cx="120" cy="145" r="3"/><circle cx="145" cy="145" r="3"/><circle cx="170" cy="145" r="3"/><circle cx="195" cy="145" r="3"/><circle cx="220" cy="145" r="3"/>
      <circle cx="20" cy="170" r="3"/><circle cx="45" cy="170" r="3"/><circle cx="70" cy="170" r="3"/><circle cx="95" cy="170" r="3"/><circle cx="120" cy="170" r="3"/><circle cx="145" cy="170" r="3"/><circle cx="170" cy="170" r="3"/><circle cx="195" cy="170" r="3"/><circle cx="220" cy="170" r="3"/>
      <circle cx="20" cy="195" r="3"/><circle cx="45" cy="195" r="3"/><circle cx="70" cy="195" r="3"/><circle cx="95" cy="195" r="3"/><circle cx="120" cy="195" r="3"/><circle cx="145" cy="195" r="3"/><circle cx="170" cy="195" r="3"/><circle cx="195" cy="195" r="3"/><circle cx="220" cy="195" r="3"/>
    </g>

    <!-- Items hung on pegboard -->
    <!-- Cables (left side) -->
    <path d="M25,55 Q35,80 25,100" stroke="#888" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M45,60 Q55,85 50,105" stroke="#666" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- UGREEN hubs (middle) -->
    <rect x="80" y="50" width="35" height="12" fill="#aaa" rx="3"/>
    <rect x="80" y="70" width="35" height="12" fill="#aaa" rx="3"/>
    <rect x="80" y="90" width="35" height="12" fill="#aaa" rx="3"/>
    <!-- Apple TV (right) -->
    <rect x="160" y="55" width="35" height="30" fill="#1a1a1a" rx="5"/>
    <rect x="170" y="60" width="15" height="4" fill="#333" rx="2"/>
    <!-- Mixer -->
    <rect x="150" y="110" width="55" height="35" fill="#e8e0d8" rx="4" stroke="#ccc" stroke-width="0.5"/>
    <circle cx="162" cy="125" r="4" fill="#ddd" stroke="#bbb" stroke-width="0.5"/>
    <circle cx="178" cy="125" r="4" fill="#ddd" stroke="#bbb" stroke-width="0.5"/>
    <circle cx="194" cy="125" r="4" fill="#ddd" stroke="#bbb" stroke-width="0.5"/>
    <!-- Borrowing rules notice -->
    <rect x="85" y="120" width="45" height="55" fill="#fff" rx="2" stroke="#ddd" stroke-width="0.5"/>
    <text x="107" y="140" text-anchor="middle" font-size="6" fill="#c00" font-weight="700">借用物品規則</text>
    <line x1="92" y1="148" x2="122" y2="148" stroke="#ddd" stroke-width="0.5"/>
    <line x1="92" y1="155" x2="122" y2="155" stroke="#ddd" stroke-width="0.5"/>
    <line x1="92" y1="162" x2="118" y2="162" stroke="#ddd" stroke-width="0.5"/>

    <!-- Labels on pegboard -->
    <rect x="8" y="5" width="64" height="16" fill="rgba(255,255,255,0.9)" rx="3"/>
    <text x="40" y="16" text-anchor="middle" font-size="9" fill="#333" font-weight="700">洞洞板</text>

    <rect x="15" y="30" width="55" height="14" fill="rgba(0,0,0,0.7)" rx="2"/>
    <text x="42" y="40" text-anchor="middle" font-size="7" fill="white">轉接頭 / 線材</text>

    <rect x="140" y="40" width="70" height="14" fill="rgba(0,0,0,0.7)" rx="2"/>
    <text x="175" y="50" text-anchor="middle" font-size="7" fill="white">Apple TV / 混音器</text>

    <rect x="70" y="185" width="100" height="14" fill="rgba(0,0,0,0.7)" rx="2"/>
    <text x="120" y="195" text-anchor="middle" font-size="7" fill="white">UGREEN / HDMI轉接</text>
  </g>

  <!-- ═══ 地上 (Floor items below pegboard) ═══ -->
  <g transform="translate(640, 320)">
    <!-- Ring light (standing) -->
    <circle cx="30" cy="30" r="22" fill="none" stroke="#888" stroke-width="4"/>
    <circle cx="30" cy="30" r="14" fill="none" stroke="#999" stroke-width="1.5"/>
    <rect x="27" y="52" width="6" height="60" fill="#777" rx="2"/>
    <rect x="10" y="110" width="40" height="4" fill="#888" rx="2"/>

    <!-- Tripod/stand (floor) -->
    <rect x="100" y="20" width="5" height="95" fill="#666" rx="2"/>
    <line x1="80" y1="112" x2="102" y2="85" stroke="#777" stroke-width="3" stroke-linecap="round"/>
    <line x1="125" y1="112" x2="103" y2="85" stroke="#777" stroke-width="3" stroke-linecap="round"/>

    <!-- Banner stand -->
    <rect x="160" y="10" width="4" height="100" fill="#999" rx="1"/>
    <rect x="150" y="108" width="25" height="6" fill="#aaa" rx="2"/>

    <!-- Label -->
    <rect x="10" y="125" width="200" height="20" fill="rgba(0,0,0,0.75)" rx="4"/>
    <text x="110" y="139" text-anchor="middle" font-size="10" fill="white" font-weight="600">📍 地上（洞洞板下方）</text>
    <text x="110" y="155" text-anchor="middle" font-size="8" fill="#888">環形燈 / 手機支架 / 展示架 / 燈架</text>
  </g>

  <!-- ═══ Legend / Stats ═══ -->
  <g transform="translate(100, 470)">
    <rect x="0" y="0" width="700" height="90" fill="rgba(255,255,255,0.85)" rx="10" stroke="#e0e0e0" stroke-width="1"/>
    <text x="350" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#555">各位置收納數量</text>

    <!-- Location pills -->
    <rect x="20" y="35" width="110" height="22" fill="#0891b2" rx="11"/><text x="75" y="50" text-anchor="middle" font-size="9" fill="white" font-weight="600">木櫃子右中 44件</text>
    <rect x="140" y="35" width="90" height="22" fill="#6366f1" rx="11"/><text x="185" y="50" text-anchor="middle" font-size="9" fill="white" font-weight="600">洞洞板 18件</text>
    <rect x="240" y="35" width="100" height="22" fill="#10b981" rx="11"/><text x="290" y="50" text-anchor="middle" font-size="9" fill="white" font-weight="600">木櫃子左上 12件</text>
    <rect x="350" y="35" width="100" height="22" fill="#f59e0b" rx="11"/><text x="400" y="50" text-anchor="middle" font-size="9" fill="white" font-weight="600">木櫃子右上 12件</text>

    <rect x="20" y="62" width="105" height="22" fill="#8b5cf6" rx="11"/><text x="72" y="77" text-anchor="middle" font-size="9" fill="white" font-weight="600">大推車（中）5件</text>
    <rect x="135" y="62" width="100" height="22" fill="#64748b" rx="11"/><text x="185" y="77" text-anchor="middle" font-size="9" fill="white" font-weight="600">大推車（下）4件</text>
    <rect x="245" y="62" width="80" height="22" fill="#ec4899" rx="11"/><text x="285" y="77" text-anchor="middle" font-size="9" fill="white" font-weight="600">小推車 4件</text>
    <rect x="335" y="62" width="70" height="22" fill="#94a3b8" rx="11"/><text x="370" y="77" text-anchor="middle" font-size="9" fill="white" font-weight="600">地上 6件</text>
    <rect x="415" y="62" width="80" height="22" fill="#333" rx="11"/><text x="455" y="77" text-anchor="middle" font-size="9" fill="white" font-weight="700">共 106 件</text>
  </g>
</svg>
