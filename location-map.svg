<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="-apple-system, 'PingFang TC', 'Noto Sans TC', sans-serif">
  <defs>
    <linearGradient id="wallGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7f5ee"/>
      <stop offset="60%" stop-color="#d8efe1"/>
      <stop offset="100%" stop-color="#c8e6d3"/>
    </linearGradient>

    <linearGradient id="floorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8dcc4"/>
      <stop offset="100%" stop-color="#d6c5a3"/>
    </linearGradient>
    <pattern id="planks" x="0" y="0" width="180" height="40" patternUnits="userSpaceOnUse">
      <rect width="180" height="40" fill="url(#floorGrad)"/>
      <line x1="0" y1="40" x2="180" y2="40" stroke="#c4b08a" stroke-width="1" opacity="0.4"/>
      <line x1="60" y1="0" x2="60" y2="40" stroke="#c4b08a" stroke-width="0.5" opacity="0.3"/>
      <line x1="130" y1="0" x2="130" y2="40" stroke="#c4b08a" stroke-width="0.5" opacity="0.3"/>
    </pattern>

    <linearGradient id="sunbeam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef9e7" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fef9e7" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="woodGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4ad7f"/>
      <stop offset="100%" stop-color="#b8915f"/>
    </linearGradient>
    <linearGradient id="woodDoor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c89a"/>
      <stop offset="100%" stop-color="#d4ad7f"/>
    </linearGradient>

    <linearGradient id="cartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3f47"/>
      <stop offset="100%" stop-color="#252830"/>
    </linearGradient>

    <linearGradient id="whiteCartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>

    <linearGradient id="pegBoardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3e2"/>
      <stop offset="100%" stop-color="#f5e0bd"/>
    </linearGradient>
    <pattern id="pegHoles" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="11" cy="11" r="2" fill="#c9a878" opacity="0.5"/>
    </pattern>

    <radialGradient id="plantGrad">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </radialGradient>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="6" stdDeviation="5" flood-opacity="0.18" flood-color="#1f2937"/>
    </filter>
    <filter id="smallShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="380" fill="url(#wallGrad)"/>
  <rect x="0" y="380" width="1200" height="340" fill="url(#planks)"/>
  <rect x="0" y="372" width="1200" height="14" fill="#a8946d" rx="2"/>
  <rect x="0" y="386" width="1200" height="3" fill="#8a7a5a" opacity="0.5"/>

  <!-- Sunlight beams -->
  <polygon points="0,0 380,0 0,300" fill="url(#sunbeam)" opacity="0.7"/>
  <polygon points="1200,0 900,0 1200,260" fill="url(#sunbeam)" opacity="0.5"/>

  <!-- Light particles -->
  <circle cx="220" cy="80" r="3" fill="#fef9e7" opacity="0.8"/>
  <circle cx="320" cy="150" r="2" fill="#fef9e7" opacity="0.6"/>
  <circle cx="180" cy="200" r="2" fill="#fef9e7" opacity="0.7"/>
  <circle cx="980" cy="100" r="2.5" fill="#fef9e7" opacity="0.7"/>
  <circle cx="1080" cy="180" r="2" fill="#fef9e7" opacity="0.6"/>

  <!-- Plant top-left -->
  <g transform="translate(40, 50)">
    <path d="M 8 95 L 18 130 L 62 130 L 72 95 Z" fill="#a78865" stroke="#7d6549" stroke-width="1"/>
    <ellipse cx="40" cy="95" rx="32" ry="6" fill="#8d6e4f"/>
    <ellipse cx="40" cy="55" rx="28" ry="40" fill="url(#plantGrad)" opacity="0.95"/>
    <ellipse cx="22" cy="65" rx="20" ry="32" fill="#22c55e" opacity="0.9" transform="rotate(-25 22 65)"/>
    <ellipse cx="58" cy="65" rx="20" ry="32" fill="#22c55e" opacity="0.9" transform="rotate(25 58 65)"/>
    <ellipse cx="40" cy="40" rx="14" ry="24" fill="#4ade80"/>
    <path d="M 40 30 L 40 90" stroke="#15803d" stroke-width="1.2" opacity="0.4"/>
  </g>

  <!-- Plant top-right -->
  <g transform="translate(1080, 80)">
    <path d="M 5 60 L 12 85 L 48 85 L 55 60 Z" fill="#a78865" stroke="#7d6549" stroke-width="1"/>
    <ellipse cx="30" cy="60" rx="24" ry="8" fill="#8d6e4f"/>
    <ellipse cx="30" cy="35" rx="22" ry="30" fill="#22c55e" opacity="0.95"/>
    <ellipse cx="18" cy="42" rx="14" ry="22" fill="#4ade80" opacity="0.9" transform="rotate(-20 18 42)"/>
    <ellipse cx="42" cy="42" rx="14" ry="22" fill="#4ade80" opacity="0.9" transform="rotate(20 42 42)"/>
    <ellipse cx="30" cy="22" rx="10" ry="16" fill="#86efac"/>
  </g>

  <!-- Wooden Cabinet (bigger) -->
  <g transform="translate(140, 50)" filter="url(#softShadow)">
    <rect x="0" y="0" width="290" height="320" fill="url(#woodGrad)" rx="6"/>
    <rect x="-6" y="-8" width="302" height="14" fill="#e0bf91" rx="4"/>
    <rect x="-6" y="-8" width="302" height="3" fill="#f0d2a7"/>

    <rect x="10" y="12" width="130" height="92" fill="url(#woodDoor)" rx="4" stroke="#9d7d52" stroke-width="1.2"/>
    <circle cx="120" cy="58" r="5" fill="#5d4530"/>
    <rect x="148" y="12" width="130" height="92" fill="url(#woodDoor)" rx="4" stroke="#9d7d52" stroke-width="1.2"/>
    <circle cx="158" cy="58" r="5" fill="#5d4530"/>

    <rect x="10" y="112" width="130" height="92" fill="url(#woodDoor)" rx="4" stroke="#9d7d52" stroke-width="1.2"/>
    <circle cx="120" cy="158" r="5" fill="#5d4530"/>
    <rect x="148" y="112" width="130" height="92" fill="url(#woodDoor)" rx="4" stroke="#9d7d52" stroke-width="1.2"/>
    <circle cx="158" cy="158" r="5" fill="#5d4530"/>

    <rect x="10" y="212" width="130" height="92" fill="url(#woodDoor)" rx="4" stroke="#9d7d52" stroke-width="1.2"/>
    <circle cx="120" cy="258" r="5" fill="#5d4530"/>
    <rect x="148" y="212" width="130" height="92" fill="url(#woodDoor)" rx="4" stroke="#9d7d52" stroke-width="1.2"/>
    <circle cx="158" cy="258" r="5" fill="#5d4530"/>

    <text x="75" y="56" text-anchor="middle" font-size="15" font-weight="700" fill="#5d4530">左上</text>
    <text x="75" y="76" text-anchor="middle" font-size="11" fill="#7d5b3a">配件 / 記憶卡</text>
    <text x="213" y="56" text-anchor="middle" font-size="15" font-weight="700" fill="#5d4530">右上</text>
    <text x="213" y="76" text-anchor="middle" font-size="11" fill="#7d5b3a">收音 / 麥克風</text>
    <text x="75" y="156" text-anchor="middle" font-size="15" font-weight="700" fill="#5d4530">左中</text>
    <text x="75" y="176" text-anchor="middle" font-size="11" fill="#7d5b3a">DJI 全套</text>
    <text x="213" y="156" text-anchor="middle" font-size="15" font-weight="700" fill="#5d4530">右中</text>
    <text x="213" y="176" text-anchor="middle" font-size="11" fill="#7d5b3a">相機 / 鏡頭</text>
    <text x="75" y="256" text-anchor="middle" font-size="15" font-weight="700" fill="#5d4530">左下</text>
    <text x="75" y="276" text-anchor="middle" font-size="11" fill="#7d5b3a">收納袋</text>
    <text x="213" y="256" text-anchor="middle" font-size="15" font-weight="700" fill="#5d4530">右下</text>
    <text x="213" y="276" text-anchor="middle" font-size="11" fill="#7d5b3a">口罩 / 雜物</text>
  </g>
  <text x="285" y="408" text-anchor="middle" font-size="20" font-weight="800" fill="#1f2937">木櫃子</text>
  <text x="285" y="428" text-anchor="middle" font-size="12" fill="#4b5563">配件 / 相機 / 收音</text>

  <!-- Big Cart (3 tiers) -->
  <g transform="translate(490, 50)" filter="url(#softShadow)">
    <rect x="0" y="0" width="180" height="320" fill="url(#cartGrad)" rx="8"/>
    <rect x="-4" y="-6" width="188" height="12" fill="#52575f" rx="4"/>
    <rect x="10" y="14" width="160" height="96" fill="#f8f9fa" rx="3"/>
    <rect x="10" y="116" width="160" height="96" fill="#f8f9fa" rx="3"/>
    <rect x="10" y="218" width="160" height="96" fill="#f8f9fa" rx="3"/>
    <text x="90" y="58" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2937">上層</text>
    <text x="90" y="80" text-anchor="middle" font-size="12" fill="#4b5563">鍵盤滑鼠</text>
    <text x="90" y="160" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2937">中層</text>
    <text x="90" y="182" text-anchor="middle" font-size="12" fill="#4b5563">三腳架 / 燈架</text>
    <text x="90" y="262" text-anchor="middle" font-size="16" font-weight="700" fill="#1f2937">下層</text>
    <text x="90" y="284" text-anchor="middle" font-size="12" fill="#4b5563">油壓腳架 / 兔籠</text>
    <circle cx="20" cy="334" r="14" fill="#1a1d24" stroke="#0a0c10" stroke-width="2"/>
    <circle cx="20" cy="334" r="6" fill="#3a3f47"/>
    <circle cx="160" cy="334" r="14" fill="#1a1d24" stroke="#0a0c10" stroke-width="2"/>
    <circle cx="160" cy="334" r="6" fill="#3a3f47"/>
  </g>
  <text x="580" y="408" text-anchor="middle" font-size="20" font-weight="800" fill="#1f2937">大推車</text>
  <text x="580" y="428" text-anchor="middle" font-size="12" fill="#4b5563">鍵盤 / 腳架 / 兔籠</text>

  <!-- White Cart (small) -->
  <g transform="translate(720, 100)" filter="url(#softShadow)">
    <rect x="0" y="0" width="140" height="270" fill="url(#whiteCartGrad)" rx="6" stroke="#bbbbbb" stroke-width="1"/>
    <rect x="-3" y="-5" width="146" height="10" fill="#e8e8e8" rx="3"/>
    <rect x="8" y="10" width="124" height="120" fill="#f5f5f5" rx="3" stroke="#d0d0d0" stroke-width="0.8"/>
    <rect x="8" y="138" width="124" height="120" fill="#f5f5f5" rx="3" stroke="#d0d0d0" stroke-width="0.8"/>
    <text x="70" y="78" text-anchor="middle" font-size="15" font-weight="700" fill="#4b5563">小推車</text>
    <text x="70" y="206" text-anchor="middle" font-size="11" fill="#6b7280">補光燈/Godox</text>
    <circle cx="14" cy="280" r="11" fill="#5a5d65" stroke="#3a3f47" stroke-width="1.5"/>
    <circle cx="126" cy="280" r="11" fill="#5a5d65" stroke="#3a3f47" stroke-width="1.5"/>
  </g>

  <!-- Pegboard (bigger) -->
  <g transform="translate(900, 60)" filter="url(#softShadow)">
    <rect x="0" y="0" width="260" height="310" fill="url(#pegBoardGrad)" rx="8" stroke="#b89863" stroke-width="2"/>
    <rect x="14" y="14" width="232" height="282" fill="url(#pegHoles)" rx="4"/>
    <rect x="40" y="40" width="60" height="40" fill="#86efac" rx="3" opacity="0.85" filter="url(#smallShadow)"/>
    <rect x="120" y="50" width="50" height="60" fill="#fbbf24" rx="3" opacity="0.85" filter="url(#smallShadow)"/>
    <rect x="190" y="40" width="40" height="50" fill="#fb7185" rx="3" opacity="0.85" filter="url(#smallShadow)"/>
    <rect x="50" y="120" width="80" height="30" fill="#60a5fa" rx="3" opacity="0.85" filter="url(#smallShadow)"/>
    <rect x="150" y="130" width="70" height="40" fill="#a78bfa" rx="3" opacity="0.85" filter="url(#smallShadow)"/>
    <rect x="30" y="180" width="50" height="50" fill="#34d399" rx="3" opacity="0.85" filter="url(#smallShadow)"/>
    <rect x="100" y="190" width="60" height="35" fill="#f97316" rx="3" opacity="0.85" filter="url(#smallShadow)"/>
    <rect x="180" y="200" width="55" height="60" fill="#22d3ee" rx="3" opacity="0.85" filter="url(#smallShadow)"/>
  </g>
  <text x="1030" y="408" text-anchor="middle" font-size="20" font-weight="800" fill="#1f2937">洞洞板</text>
  <text x="1030" y="428" text-anchor="middle" font-size="12" fill="#4b5563">轉接頭 / 線材</text>

  <!-- Floor area: ring light + tripods -->
  <g transform="translate(900, 440)">
    <g filter="url(#smallShadow)">
      <circle cx="50" cy="60" r="40" fill="none" stroke="#facc15" stroke-width="6"/>
      <circle cx="50" cy="60" r="40" fill="none" stroke="#fef08a" stroke-width="2" opacity="0.8"/>
      <line x1="50" y1="100" x2="50" y2="200" stroke="#374151" stroke-width="3"/>
      <ellipse cx="50" cy="200" rx="28" ry="6" fill="#374151"/>
    </g>
    <g transform="translate(140, 0)" filter="url(#smallShadow)">
      <line x1="20" y1="20" x2="0" y2="200" stroke="#1f2937" stroke-width="3"/>
      <line x1="20" y1="20" x2="40" y2="200" stroke="#1f2937" stroke-width="3"/>
      <line x1="20" y1="20" x2="20" y2="200" stroke="#1f2937" stroke-width="3"/>
      <circle cx="20" cy="15" r="8" fill="#374151"/>
    </g>
    <g transform="translate(220, 30)" filter="url(#smallShadow)">
      <line x1="15" y1="0" x2="0" y2="170" stroke="#1f2937" stroke-width="2.5"/>
      <line x1="15" y1="0" x2="30" y2="170" stroke="#1f2937" stroke-width="2.5"/>
      <line x1="15" y1="0" x2="15" y2="170" stroke="#1f2937" stroke-width="2.5"/>
      <circle cx="15" cy="-5" r="6" fill="#374151"/>
    </g>
  </g>
  <g transform="translate(900, 660)">
    <rect x="0" y="0" width="260" height="34" fill="#374151" rx="6" opacity="0.92"/>
    <text x="130" y="20" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">地上（洞洞板下方）</text>
    <text x="130" y="40" text-anchor="middle" font-size="11" fill="#d1d5db">環形燈 / 三腳架 / 展示架</text>
  </g>

  <!-- Floor shadows -->
  <ellipse cx="285" cy="380" rx="180" ry="6" fill="#000" opacity="0.1"/>
  <ellipse cx="580" cy="395" rx="100" ry="5" fill="#000" opacity="0.1"/>
  <ellipse cx="790" cy="378" rx="80" ry="4" fill="#000" opacity="0.1"/>
  <ellipse cx="1030" cy="380" rx="140" ry="5" fill="#000" opacity="0.1"/>
</svg>
